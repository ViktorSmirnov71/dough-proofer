<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica, Arial" font-size="14">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".15"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">PI time-proportional heater controller</text>

  <!-- Setpoint -->
  <g filter="url(#soft)">
    <rect x="30" y="120" width="120" height="60" rx="10" fill="#0ea5e9"/>
    <text x="90" y="148" text-anchor="middle" fill="white" font-weight="600">setpoint</text>
    <text x="90" y="166" text-anchor="middle" fill="white" font-size="12" opacity=".9">user (B3/B4)</text>
  </g>

  <!-- Summer (error) -->
  <g filter="url(#soft)">
    <circle cx="220" cy="150" r="22" fill="#1f2937"/>
    <text x="220" y="146" text-anchor="middle" fill="white" font-size="16">+</text>
    <text x="220" y="164" text-anchor="middle" fill="white" font-size="16">-</text>
  </g>

  <!-- P block -->
  <g filter="url(#soft)">
    <rect x="290" y="80" width="130" height="60" rx="10" fill="#22c55e"/>
    <text x="355" y="108" text-anchor="middle" fill="white" font-weight="600">P-term</text>
    <text x="355" y="128" text-anchor="middle" fill="white" font-size="12" opacity=".95">e / band</text>
  </g>

  <!-- I block -->
  <g filter="url(#soft)">
    <rect x="290" y="160" width="130" height="60" rx="10" fill="#f59e0b"/>
    <text x="355" y="186" text-anchor="middle" fill="white" font-weight="600">I-term</text>
    <text x="355" y="206" text-anchor="middle" fill="white" font-size="12" opacity=".95">Ki · ∫e dt + anti-windup</text>
  </g>

  <!-- Sum + clamp -->
  <g filter="url(#soft)">
    <rect x="470" y="120" width="120" height="60" rx="10" fill="#1f2937"/>
    <text x="530" y="148" text-anchor="middle" fill="white" font-weight="600">Σ + clamp</text>
    <text x="530" y="166" text-anchor="middle" fill="white" font-size="12" opacity=".9">duty 0..1</text>
  </g>

  <!-- TPC PWM -->
  <g filter="url(#soft)">
    <rect x="640" y="120" width="130" height="60" rx="10" fill="#8b5cf6"/>
    <text x="705" y="148" text-anchor="middle" fill="white" font-weight="600">slow PWM</text>
    <text x="705" y="166" text-anchor="middle" fill="white" font-size="12" opacity=".95">20 s window</text>
  </g>

  <!-- Plant -->
  <g filter="url(#soft)">
    <rect x="640" y="240" width="200" height="80" rx="10" fill="#ef4444"/>
    <text x="740" y="270" text-anchor="middle" fill="white" font-weight="600">chamber + heater</text>
    <text x="740" y="290" text-anchor="middle" fill="white" font-size="12" opacity=".95">relay → silicone pad</text>
    <text x="740" y="306" text-anchor="middle" fill="white" font-size="12" opacity=".95">DS18B20 probe (T)</text>
  </g>

  <!-- Lines -->
  <line x1="150" y1="150" x2="198" y2="150" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="242" y1="150" x2="278" y2="110" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="242" y1="150" x2="278" y2="190" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="420" y1="110" x2="468" y2="140" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="420" y1="190" x2="468" y2="160" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="590" y1="150" x2="638" y2="150" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="705" y1="180" x2="705" y2="238" stroke="#1f2937" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Feedback -->
  <path d="M640,280 L80,280 L80,180 L198,180" fill="none" stroke="#1f2937" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ah)"/>
  <text x="320" y="272" text-anchor="middle" fill="#475569" font-size="12" font-style="italic">measured T (1 Hz non-blocking DS18B20)</text>

  <!-- Labels -->
  <text x="178" y="142" fill="#475569" font-size="12">error</text>
  <text x="448" y="100" fill="#475569" font-size="12">P</text>
  <text x="448" y="200" fill="#475569" font-size="12">I</text>
  <text x="618" y="142" fill="#475569" font-size="12">duty</text>
  <text x="730" y="218" fill="#475569" font-size="12">relay</text>
</svg>
